<!DOCTYPE html>
<html lang="es">
<head>

<body>

        <!-- Encabezado -->
   <header class="header2">
 <nav>

          <li class="nav-item-home">
              <a href="index.html">
              <img src="images/logo-blanco.png" class="homebutton" alt="Inicio">
            </a>
          </li>

</nav>

    <!-- Enlace corregido -->
    <a href="esquineras.html">

       <section class="producto">
            <div class="thumbnail3" data-id="Valeta" data-nombre="VALETA" data-precio="10699">

                        <img src="images/esquineras/valeta/valetaportada.png" class="carrusel-producto-item active" alt="Vista 1">

        </section>
