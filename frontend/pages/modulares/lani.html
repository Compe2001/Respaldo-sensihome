<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hanna - Sensi Home</title>
     <link rel="icon" href="/frontend/images/logo-blanco.png" type="image/x-icon">
  <link href="/frontend/css/simpleGridTemplate.css" rel="stylesheet" type="text/css">
  <link href="/frontend/css/notifications.css" rel="stylesheet" type="text/css">
  <link href="/frontend/css/thumbnails.css" rel="stylesheet" type="text/css">
  <link href="/frontend/css/buttons.css" rel="stylesheet" type="text/css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
<body>
    <!-- Contenedor Principal -->
    <div class="container">
        <!-- Encabezado -->
        <header class="header2">
           
                
                    
        <a href="/frontend/index.html" >
        <img src="/frontend/images/logo-blanco.png" class="homebutton" alt="Inicio">
        </a>
                
            <!-- Enlace corregido -->
            <a href="/frontend/pages/salasmodulares.html">
                <button class="returnsection_button animate__animated animate__pulse">SALAS MODULARES</button>
            </a>

            <button onclick="window.location.href='/frontend/carrito.html'" class="carrito-button">
  <img src="/frontend/images/carrito.png" alt="Carrito">
  <span class="carrito-count">0</span>
</button>
        </header>
        <section class="producto">
           
<div class="thumbnail5" data-nombre="tokio">
  <!-- 🖼️ Imagen principal -->
<div class="carrusel-producto">
                    <div class="carrusel-producto-wrapper">
                        <img src="/frontend/images/modulares/tokio/tokio_portada.jpg" class="carrusel-producto-item active" alt="Vista 1">
                        <img src="/frontend/images/modulares/tokio/tokio_isometrico.jpg" class="carrusel-producto-item" alt="Vista 2">
                        <img src="/frontend/images/modulares/tokio/tokio_ambientada.jpg" class="carrusel-producto-item" alt="Vista 3">
</div>
                    <button class="carrusel-producto-btn prev">&#9664;</button>
                    <button class="carrusel-producto-btn next">&#9654;</button>
  <!-- 🏷️ Título -->
  <h4 class="card-title">TOKIO</h4>
  <p class="tag">Elige los módulos que deseas incluir</p>

  <!-- 🧩 Selector de módulos -->
  <div class="modulos-selector">
    <label class="modulo-label">
      <input type="checkbox" data-id="tokio-esquina"> SILLÓN CON BRAZO DERECHO
          <div class="carrito-controles">
          <button class="btn-sumar" data-id="${item.id}">+</button>
          <button class="btn-restar" data-id="${item.id}">–</button>
        </div>
    </label>
     <label class="modulo-label">
      <input type="checkbox" data-id="tokio-esquina"> SILLÓN CON BRAZO IZQUIERDO
        <div class="carrito-controles">
          <button class="btn-sumar" data-id="${item.id}">+</button>
          <button class="btn-restar" data-id="${item.id}">–</button>
        </div>
    </label>
    <label class="modulo-label">
      <input type="checkbox" data-id="tokio-sillon-sin-brazo"> SILLÓN SIN BRAZO
        <div class="carrito-controles">
          <button class="btn-sumar" data-id="${item.id}">+</button>
          <button class="btn-restar" data-id="${item.id}">–</button>
        </div>
    </label>
    <label class="modulo-label">
      <input type="checkbox" data-id="tokio-taburete"> TABURETE
        <div class="carrito-controles">
          <button class="btn-sumar" data-id="${item.id}">+</button>
          <button class="btn-restar" data-id="${item.id}">–</button>
        </div>
    </label>
    <label class="modulo-label">
      <input type="checkbox" data-id="sala-completa"> SALA COMPLETA
        <div class="carrito-controles">
          <button class="btn-sumar" data-id="${item.id}">+</button>
          <button class="btn-restar" data-id="${item.id}">–</button>
        </div>
    </label>
  </div>

  <!-- 💰 Total calculado -->
  <p class="precio-total">Total: $0 MXN</p>

  <!-- 🛒 Botón de acción -->
  <button class="agregar-configuracion" disabled>Agregar configuración al carrito 🛋️</button>
</div>

        </section>
        <!-- Pie de Página -->
        <footer class="footer">
            <p> 2025 - Sensi Home | Guadalajara, Jalisco </p>
        </footer>
    </div>
    <div id="notificaciones"></div>
    <script src="/frontend/js/thumbnailsstock.js"></script>
    <script src="/frontend/js/thumbnailConfigManager.js"></script>
    <script src="/frontend/js/notificaciones.js"></script>
    <script src="/frontend/js/carrito.js"></script>
    <script src="/frontend/js/carrusel-producto.js" defer></script>
    <script src="/frontend/js/whatsapp-contacto.js" defer></script>
    
</body>
<footer class="header2">
<div class="footerindex">Atención a clientes Sucursal 33-33-33-33-33 soporte@sensihome.com.mx</div>

<div class="footerindex"> Aviso de privacidad Términos y condiciones © Sensi Home Todos los derechos reservados. </div>



</footer>
</html>
