     <link rel="icon" href="/frontend/images/logo-blanco.png" type="image/x-icon">

  <link href="/frontend/css/thumbnails.css" rel="stylesheet" type="text/css">

<body>
    <!-- Contenedor Principal -->
    <div class="container">
        <!-- Encabezado -->
        <header class="header2">
           
                
                    
        <a href="/frontend/index.html" >
        <img src="/frontend/images/logo-blanco.png" class="homebutton" alt="Inicio">
        </a>
                
            <!-- Enlace corregido -->
            <a href="/frontend/pages/sillones.html">
                <button class="returnsection_button animate__animated animate__pulse">SALA MODULAR</button>
            </a>

            <button onclick="window.location.href='/frontend/carrito.html'" class="carrito-button">
  <img src="/frontend/images/carrito.png" alt="Carrito">
  <span class="carrito-count">0</span>
</button>
        </header>
        <section class="producto">
           <div class="thumbnail5" data-nombre="SALA MODULAR">
  <!-- 🖼️ Imagen principal -->
  <img src="/frontend/images/modulares/tokio/tokio_portada.jpg" class="cards" alt="Sala Modular">

  <!-- 🏷️ Título -->
  <h4 class="card-title">SALA MODULAR</h4>
  <p class="tag">Elige los módulos que deseas incluir</p>

  <!-- 🧩 Selector de módulos -->
  <div class="modulos-selector">
    <label class="modulo-label">
      <input type="checkbox" data-id="modulo-a"> Módulo A (Esquinero)
    </label>
    <label class="modulo-label">
      <input type="checkbox" data-id="modulo-b"> Módulo B (Central)
    </label>
    <label class="modulo-label">
      <input type="checkbox" data-id="modulo-c"> Módulo C (Reposet)
    </label>
    <label class="modulo-label">
      <input type="checkbox" data-id="sala-completa"> Sala Completa
    </label>
  </div>

  <!-- 💰 Total calculado -->
  <p class="precio-total">Total: $0 MXN</p>

  <!-- 🛒 Botón de acción -->
  <button class="agregar-configuracion" disabled>Agregar configuración 🛋️</button>
</div>

        </section>
        <!-- Pie de Página -->
        <footer class="footer">
            <p> 2025 - Sensi Home | Guadalajara, Jalisco </p>
        </footer>
    </div>
    <div id="notificaciones"></div>
    <script src="/frontend/js/thumbnailsstock.js"></script>
