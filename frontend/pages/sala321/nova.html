<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Producto - Sensi Home</title>
    <link rel="stylesheet" href="css/simpleGridTemplate.css">
</head>
<body>
    <!-- Contenedor Principal -->
    <div class="container">
        <!-- Encabezado -->
        <header class="header2">
            <nav>
                <ul class="navbar">
                    <li class="nav-item-home">
                        <a href="index.html">
                            <img src="images/logo-blanco.png" class="homebutton" alt="Inicio">
                        </a>
                    </li>
                </ul>
            </nav>
            

            <!-- Enlace corregido -->
            <a href="salas321.html">
                <h3 class="returnsection">SALAS 3-2-1</h3>
            </a>

            <button onclick="window.location.href='carrito.html'" class="carrito-button">
  <img src="images/carrito.png" alt="Carrito">
  <span class="carrito-count">0</span>
</button>
        </header>
        <section class="producto">
            <div class="thumbnail3" data-id="nova" data-nombre="Nova" data-precio="7999">
                <div class="carrusel-producto">
                    <div class="carrusel-producto-wrapper">
                        <img src="images/salas3.2.1/nova.png" class="carrusel-producto-item active" alt="Vista 1">
                        <img src="images/sillones/raven/raven-isometrico.jpg" class="carrusel-producto-item" alt="Vista 2">
                    </div>
                    <button class="carrusel-producto-btn prev">&#9664;</button>
                    <button class="carrusel-producto-btn next">&#9654;</button>
                </div>
                <h2>NOVA</h2>
                <p class="precio">$7,999 MXN</p>
                <p class="descripcion">Sillón giratorio, ajustable.</p>
                <ul class="caracteristicas">
                    <li>Gira 360°</li>
                    <li>Ajuste de altura neumático</li>
                    <li>Tapizado suave al tacto</li>
                    <li>Estructura metálica resistente</li>
                </ul>
                <button class="agregar-carrito">Agregar al carrito</button>
                <button class="comprar">Comprar Via Whatsapp (solo ZMG) </button>
                <button class="contacto">Más Información</button>
            </div>
        </section>
        <!-- Pie de Página -->
        <footer class="footer">
            <p>2025 - Sensi Home | Guadalajara, Jalisco</p>
        </footer>
    </div>
    <script src="js/carrito.js"></script>
    <script src="js/carrusel-producto.js" defer></script>
    <script src="js/whatsapp-contacto.js" defer></script>
</body>
</html>
